version: '3'

services:
  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: quizyDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Cermak10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  quiz-frontend:
    image: node:14
    working_dir: /app
    volumes:
      - ./quiz-frontend:/app
    ports:
      - "3000:3000"
    command: [ "yarn", "start" ]

volumes:
  postgres_data:
